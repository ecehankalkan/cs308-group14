$kind: http-request
name: Update Cart Item
method: PATCH
url: '{{baseUrl}}/api/cart/{{cartItemId}}/'
order: 4000
description: Update the quantity of a cart item.
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "quantity": 2
    }
