$kind: http-request
name: Add to Wishlist
method: POST
url: '{{baseUrl}}/api/wishlist/'
order: 2000
description: Add a product to the wishlist.
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "product_id": 1
    }
